name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: Test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Unit tests
        run: npm test
      - name: Build (validates all story files)
        run: npm run build
